server:
  port: 8888
spring:
  application:
    name: shopflow-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auth/**

        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/orders/**

        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/inventory/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}