services:
  order-db:
    image: postgres:15-alpine
    container_name: shopflow_order_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_ORDER_DB}
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - shopflow-network
  identity-db:
    image: postgres:15-alpine
    container_name: shopflow_identity_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_IDENTITY_DB}
    ports:
      - "5434:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - shopflow-network
  inventory-db:
    image: postgres:15-alpine
    container_name: shopflow_inventory_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_INVENTORY_DB}
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - shopflow-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: shopflow_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
    networks:
      - shopflow-network
  redis:
    image: redis:7-alpine
    container_name: shopflow_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - shopflow-network
  prometheus:
    image: prom/prometheus:latest
    profiles: [ "monitor" ]
    container_name: shopflow_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shopflow-network

  grafana:
    image: grafana/grafana:latest
    profiles: [ "monitor" ]
    container_name: shopflow_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - shopflow-network

  zipkin:
    image: openzipkin/zipkin:latest
    profiles: [ "monitor" ]
    container_name: shopflow_zipkin
    ports:
      - "9411:9411"
    networks:
      - shopflow-network

  shopflow-order:
    build:
      context: .
      args:
        SERVICE_NAME: shopflow-order
    container_name: shopflow-order
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://shopflow_order_db:5432/${POSTGRES_ORDER_DB}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=shopflow_kafka:9092
      - SPRING_DATA_REDIS_HOST=shopflow_redis
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://shopflow_zipkin:9411/api/v2/spans
    depends_on:
      - order-db
      - kafka
      - redis
    networks:
      - shopflow-network
  shopflow-identity:
    build:
      context: .
      args:
        SERVICE_NAME: shopflow-identity
    container_name: shopflow-identity
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://shopflow_identity_db:5432/${POSTGRES_IDENTITY_DB}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=shopflow_kafka:9092
      - SPRING_DATA_REDIS_HOST=shopflow_redis
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://shopflow_zipkin:9411/api/v2/spans
    depends_on:
      - identity-db
      - kafka
      - redis
    networks:
      - shopflow-network
  shopflow-inventory:
    build:
      context: .
      args:
        SERVICE_NAME: shopflow-inventory
    container_name: shopflow-inventory
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://shopflow_iventory_db:5432/${POSTGRES_INVENTORY_DB}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=shopflow_kafka:9092
      - SPRING_DATA_REDIS_HOST=shopflow_redis
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://shopflow_zipkin:9411/api/v2/spans
    depends_on:
      - inventory-db
      - kafka
      - redis
    networks:
      - shopflow-network

volumes:
  order-db-data:
  identity-db-data:
  inventory-db-data:

networks:
  shopflow-network:
    driver: bridge